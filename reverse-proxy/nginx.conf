server {
    listen 80;

    client_max_body_size 10M;

    # Résolveur DNS interne de Docker : force nginx à re-résoudre les noms de
    # service à chaque requête au lieu de mettre l'IP en cache indéfiniment.
    # Sans ça, un service recréé (nouvelle IP) devient injoignable tant que
    # reverse-proxy lui-même n'est pas recréé/redémarré.
    resolver 127.0.0.11 valid=10s;

    location /v1/auth/ {
        set $upstream_auth http://auth-service:3000;
        proxy_pass $upstream_auth;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /v1/projects/ {
        set $upstream_project http://project-service:3001;
        proxy_pass $upstream_project;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /v1/tasks/ {
        set $upstream_task http://task-service:3002;
        proxy_pass $upstream_task;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /v1/notifications/ws {
        set $upstream_notification_ws http://notification-service:3003;
        proxy_pass $upstream_notification_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /v1/notifications/ {
        set $upstream_notification http://notification-service:3003;
        proxy_pass $upstream_notification;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health/projects {
        set $upstream_health http://project-service:3001;
        proxy_pass $upstream_health/health;
    }

    location / {
        set $upstream_frontend http://frontend:80;
        proxy_pass $upstream_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
