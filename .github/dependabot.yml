version: 2

updates:
  # ─── Dépendances racine ──────────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
    labels:
      - dependencies
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  # ─── Auth service ────────────────────────────────────────────────────────────
