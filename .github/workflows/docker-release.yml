name: Docker Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  verify-versions:
    name: Verify tag matches package.json versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check all package.json versions match tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FAILED=0
          for pkg in auth-service/package.json project-service/package.json task-service/package.json notification-service/package.json frontend/package.json; do
            PKG_VERSION=$(jq -r .version "$pkg")
            if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
              echo "MISMATCH: $pkg has version $PKG_VERSION but tag is v$TAG_VERSION"
              FAILED=1
            else
              echo "OK: $pkg = $PKG_VERSION"
            fi
          done
          exit $FAILED

  build-and-push:
    name: Release ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: verify-versions
    permissions:
      packages: write
    strategy:
      matrix:
        include:
          - service: auth-service
            context: .
          - service: project-service
            context: .
          - service: task-service
            context: .
          - service: notification-service
            context: .
          - service: frontend
            context: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
      
      - name: Extract major and minor versions
        run: |
          echo "MAJOR=$(echo ${VERSION} | cut -d. -f1)" >> $GITHUB_ENV
          echo "MINOR=$(echo ${VERSION} | cut -d. -f1,2)" >> $GITHUB_ENV

      - name: Set image name
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Login GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push versioned image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.service }}/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
              ghcr.io/${{ env.IMAGE_NAME }}/${{ matrix.service }}:latest
              ghcr.io/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ env.MAJOR }}
              ghcr.io/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ env.MINOR }}
              ghcr.io/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ env.VERSION }}
          build-args: |
            VERSION=${{ env.VERSION }}
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Set image name
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Generate compatibility manifest
        run: |
          cat > compatibility.json << EOF
          {
            "stack": "${{ env.VERSION }}",
            "api": "v1",
            "releasedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "services": {
              "auth-service":          "${{ env.VERSION }}",
              "project-service":       "${{ env.VERSION }}",
              "task-service":          "${{ env.VERSION }}",
              "notification-service":  "${{ env.VERSION }}",
              "frontend":              "${{ env.VERSION }}"
            },
            "images": {
              "auth-service":          "ghcr.io/${{ env.IMAGE_NAME }}/auth-service:${{ env.VERSION }}",
              "project-service":       "ghcr.io/${{ env.IMAGE_NAME }}/project-service:${{ env.VERSION }}",
              "task-service":          "ghcr.io/${{ env.IMAGE_NAME }}/task-service:${{ env.VERSION }}",
              "notification-service":  "ghcr.io/${{ env.IMAGE_NAME }}/notification-service:${{ env.VERSION }}",
              "frontend":              "ghcr.io/${{ env.IMAGE_NAME }}/frontend:${{ env.VERSION }}"
            }
          }
          EOF

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            compatibility.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
