name: CI

on:
    pull_request:
        branches:
            - dev
            - main

jobs:
    # ─── Détection des services modifiés ─────────────────────────────────────────

    changes:
        name: Détection des changements
        runs-on: ubuntu-latest
        outputs:
            auth: ${{ steps.filter.outputs.auth }}
            project: ${{ steps.filter.outputs.project }}
            task: ${{ steps.filter.outputs.task }}
            notification: ${{ steps.filter.outputs.notification }}
            frontend: ${{ steps.filter.outputs.frontend }}
            root: ${{ steps.filter.outputs.root }}
            dockerfile: ${{ steps.filter.outputs.dockerfile }}
        steps:
            - uses: actions/checkout@v4

            - uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      auth:
                        - 'auth-service/**'
                      project:
                        - 'project-service/**'
                      task:
                        - 'task-service/**'
                      notification:
                        - 'notification-service/**'
                      frontend:
                        - 'frontend/**'
                      root:
                        - 'package.json'
                        - 'eslint.config.mjs'
                        - '.dependency-cruiser.cjs'
                      dockerfile:
                        - '**/Dockerfile'

    # ─── Tests par service (uniquement si modifié) ───────────────────────────────

    test-auth:
        name: Tests auth-service
        needs: changes
        if: needs.changes.outputs.auth == 'true'
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: auth-service
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: auth-service/package-lock.json

            - run: npm ci
            - run: npm run build
            - run: npm run test:coverage

            - name: Upload rapport coverage auth-service
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-auth-service
                  path: auth-service/coverage/
                  retention-days: 7

    test-project:
        name: Tests project-service
        needs: changes
        if: needs.changes.outputs.project == 'true'
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: project-service
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: project-service/package-lock.json

            - run: npm ci
            - run: npm run build
            - run: npm run test:coverage

            - name: Upload rapport coverage project-service
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-project-service
                  path: project-service/coverage/
                  retention-days: 7

    test-task:
        name: Tests task-service
        needs: changes
        if: needs.changes.outputs.task == 'true'
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: task-service
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: task-service/package-lock.json

            - run: npm ci
            - run: npm run build
            - run: npm run test:coverage

            - name: Upload rapport coverage task-service
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-task-service
                  path: task-service/coverage/
                  retention-days: 7

    test-notification:
        name: Tests notification-service
        needs: changes
        if: needs.changes.outputs.notification == 'true'
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: notification-service
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: notification-service/package-lock.json

            - run: npm ci
            - run: npm run build
            - run: npm test

    # ─── Qualité du code (si fichiers racine ou n'importe quel service modifié) ──

    lint:
        name: Lint & Architecture
        needs: changes
        if: |
            needs.changes.outputs.root == 'true' ||
            needs.changes.outputs.auth == 'true' ||
            needs.changes.outputs.project == 'true' ||
            needs.changes.outputs.task == 'true' ||
            needs.changes.outputs.notification == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - run: npm ci
            - run: npm run lint
            - run: npm run lint:architecture

    # ─── Lint Dockerfiles ────────────────────────────────────────────────────────

    hadolint:
        name: Hadolint ${{ matrix.service }}
        needs: changes
        if: needs.changes.outputs.dockerfile == 'true'
        runs-on: ubuntu-latest
        strategy:
            matrix:
                service:
                    - auth-service
                    - project-service
                    - task-service
                    - notification-service
                    - frontend
        steps:
            - uses: actions/checkout@v4

            - uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf  # v3.1.0
              with:
                  dockerfile: ${{ matrix.service }}/Dockerfile

    # ─── Sécurité des dépendances ────────────────────────────────────────────────

    audit:
      name: Audit sécurité ${{ matrix.service }}
      needs: changes
      if: |
          needs.changes.outputs.auth == 'true' ||
          needs.changes.outputs.project == 'true' ||
          needs.changes.outputs.task == 'true' ||
          needs.changes.outputs.notification == 'true'
      runs-on: ubuntu-latest
      strategy:
          matrix:
              service:
                  - auth-service
                  - project-service
                  - task-service
                  - notification-service
      steps:
          - uses: actions/checkout@v4

          - uses: actions/setup-node@v4
            with:
                node-version: 20
                cache: npm
                cache-dependency-path: ${{ matrix.service }}/package-lock.json

          - name: Install dependencies
            working-directory: ${{ matrix.service }}
            run: npm ci

          - name: Run npm audit
            working-directory: ${{ matrix.service }}
            run: npm audit --audit-level=high

    # ─── Build Docker (sans push) ────────────────────────────────────────────────

    docker-build:
        name: Build Docker ${{ matrix.service }}
        needs: changes
        if: |
            needs.changes.outputs.dockerfile == 'true' ||
            needs.changes.outputs.auth == 'true' ||
            needs.changes.outputs.project == 'true' ||
            needs.changes.outputs.task == 'true' ||
            needs.changes.outputs.notification == 'true' ||
            needs.changes.outputs.frontend == 'true'
        runs-on: ubuntu-latest
        strategy:
            matrix:
                service:
                    - auth-service
                    - project-service
                    - task-service
                    - notification-service
                    - frontend
        steps:
            - uses: actions/checkout@v4

            - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

            - name: Build ${{ matrix.service }}
              uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
              with:
                  context: ${{ matrix.service }}
                  push: false
                  load: true
                  tags: ${{ matrix.service }}:pr-${{ github.event.pull_request.number }}

            - name: Scan Trivy ${{ matrix.service }}
              uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8  # v0.36.0
              with:
                  image-ref: ${{ matrix.service }}:pr-${{ github.event.pull_request.number }}
                  format: table
                  exit-code: '1'
                  severity: HIGH,CRITICAL
