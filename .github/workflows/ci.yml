name: CI

on:
    pull_request:
        branches:
            - dev
            - main

jobs:
    # ─── Détection des services modifiés ─────────────────────────────────────────

    changes:
        name: Détection des changements
        runs-on: ubuntu-latest
        outputs:
            auth: ${{ steps.filter.outputs.auth }}
            project: ${{ steps.filter.outputs.project }}
            task: ${{ steps.filter.outputs.task }}
            notification: ${{ steps.filter.outputs.notification }}
            frontend: ${{ steps.filter.outputs.frontend }}
            root: ${{ steps.filter.outputs.root }}
            dockerfile: ${{ steps.filter.outputs.dockerfile }}
            manifest: ${{ steps.filter.outputs.manifest }}
        steps:
            - uses: actions/checkout@v4

            - uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      auth:
                        - 'auth-service/**'
                      project:
                        - 'project-service/**'
                      task:
                        - 'task-service/**'
                      notification:
                        - 'notification-service/**'
                      frontend:
                        - 'frontend/**'
                        - 'tests-e2e/**'
                        - 'playwright.config.js'
                      root:
                        - 'package.json'
                        - 'eslint.config.mjs'
                        - '.dependency-cruiser.cjs'
                      dockerfile:
                        - '**/Dockerfile'
                      manifest:
                        - 'compatibility.json'
                        - '*/package.json'

    # ─── Tests par service (uniquement si modifié) ───────────────────────────────

    test-auth:
        name: Tests auth-service
        needs: changes
        if: needs.changes.outputs.auth == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: package-lock.json

            - name: Installer les dépendances
              run: npm ci

            - name: Build
              working-directory: auth-service
              run: npm run build

            - name: Tests
              working-directory: auth-service
              run: npm run test:coverage

            - name: Upload rapport coverage auth-service
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-auth-service
                  path: auth-service/coverage/
                  retention-days: 7

    test-project:
        name: Tests project-service
        needs: changes
        if: needs.changes.outputs.project == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: package-lock.json

            - name: Installer les dépendances
              run: npm ci

            - name: Build
              working-directory: project-service
              run: npm run build

            - name: Tests
              working-directory: project-service
              run: npm run test:coverage

            - name: Upload rapport coverage project-service
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-project-service
                  path: project-service/coverage/
                  retention-days: 7

    test-task:
        name: Tests task-service
        needs: changes
        if: needs.changes.outputs.task == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: package-lock.json

            - name: Installer les dépendances
              run: npm ci

            - name: Build
              working-directory: task-service
              run: npm run build

            - name: Tests
              working-directory: task-service
              run: npm run test:coverage

            - name: Upload rapport coverage task-service
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-task-service
                  path: task-service/coverage/
                  retention-days: 7

    test-notification:
        name: Tests notification-service
        needs: changes
        if: needs.changes.outputs.notification == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: package-lock.json

            - name: Installer les dépendances
              run: npm ci

            - name: Build
              working-directory: notification-service
              run: npm run build

            - name: Tests
              working-directory: notification-service
              run: npm run test:coverage

            - name: Upload rapport coverage notification-service
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-notification-service
                  path: notification-service/coverage/
                  retention-days: 7

    # ─── Qualité du code (si fichiers racine ou n'importe quel service modifié) ──

    lint:
        name: Lint & Architecture
        needs: changes
        if: |
            needs.changes.outputs.root == 'true' ||
            needs.changes.outputs.auth == 'true' ||
            needs.changes.outputs.project == 'true' ||
            needs.changes.outputs.task == 'true' ||
            needs.changes.outputs.notification == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: package-lock.json

            - run: npm ci
            - run: npm run lint
            - run: npm run lint:architecture

    # ─── Lint Dockerfiles ────────────────────────────────────────────────────────

    hadolint:
        name: Hadolint ${{ matrix.service }}
        needs: changes
        if: needs.changes.outputs.dockerfile == 'true'
        runs-on: ubuntu-latest
        strategy:
            matrix:
                service:
                    - auth-service
                    - project-service
                    - task-service
                    - notification-service
                    - frontend
        steps:
            - uses: actions/checkout@v4

            - uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf  # v3.1.0
              with:
                  dockerfile: ${{ matrix.service }}/Dockerfile
                  ignore: DL3018

    # ─── Sécurité des dépendances ────────────────────────────────────────────────

    audit:
      name: Audit sécurité
      needs: changes
      if: |
          needs.changes.outputs.auth == 'true' ||
          needs.changes.outputs.project == 'true' ||
          needs.changes.outputs.task == 'true' ||
          needs.changes.outputs.notification == 'true'
      runs-on: ubuntu-latest
      steps:
          - uses: actions/checkout@v4

          - uses: actions/setup-node@v4
            with:
                node-version: 20
                cache: npm
                cache-dependency-path: package-lock.json

          - name: Install dependencies
            run: npm ci

          - name: Run npm audit
            run: npm audit --audit-level=high

      # ─── Vérification des licences ──────────────────────────────────────────────

    license-check:
        name: Vérification licences ${{ matrix.name }}
        needs: changes
        if: |
            needs.changes.outputs.auth == 'true' ||
            needs.changes.outputs.project == 'true' ||
            needs.changes.outputs.task == 'true' ||
            needs.changes.outputs.notification == 'true' ||
            needs.changes.outputs.frontend == 'true'
        runs-on: ubuntu-latest
        strategy:
            matrix:
                include:
                    - name: backend
                      dir: .
                      lock: package-lock.json
                    - name: frontend
                      dir: frontend
                      lock: frontend/package-lock.json
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: ${{ matrix.lock }}

            - name: Install dependencies
              working-directory: ${{ matrix.dir }}
              run: npm ci

            - name: Vérifier les licences
              working-directory: ${{ matrix.dir }}
              run: npx license-checker --onlyAllow "MIT;ISC;BSD-2-Clause;BSD-3-Clause;Apache-2.0;CC0-1.0;CC-BY-3.0;CC-BY-4.0;Python-2.0;Unlicense;0BSD;MPL-2.0;LGPL-2.1-or-later;LGPL-3.0-or-later;BlueOak-1.0.0" --excludePrivatePackages

    # ─── Validation Docker Compose ──────────────────────────────────────────────

    validate-compose:
        name: Validation Docker Compose
        needs: changes
        if: |
            needs.changes.outputs.dockerfile == 'true' ||
            needs.changes.outputs.auth == 'true' ||
            needs.changes.outputs.project == 'true' ||
            needs.changes.outputs.task == 'true' ||
            needs.changes.outputs.notification == 'true' ||
            needs.changes.outputs.frontend == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Copier .env.example en .env
              run: cp .env.example .env

            - name: Valider docker-compose.yml
              run: docker compose config --quiet
    # ─── Build Docker (sans push) ────────────────────────────────────────────────

    docker-build:
        name: Build Docker ${{ matrix.service }}
        needs: changes
        if: |
            needs.changes.outputs.dockerfile == 'true' ||
            needs.changes.outputs.auth == 'true' ||
            needs.changes.outputs.project == 'true' ||
            needs.changes.outputs.task == 'true' ||
            needs.changes.outputs.notification == 'true' ||
            needs.changes.outputs.frontend == 'true'
        runs-on: ubuntu-latest
        strategy:
            matrix:
                include:
                    - service: auth-service
                      context: .
                      dockerfile: auth-service/Dockerfile
                    - service: project-service
                      context: .
                      dockerfile: project-service/Dockerfile
                    - service: task-service
                      context: .
                      dockerfile: task-service/Dockerfile
                    - service: notification-service
                      context: .
                      dockerfile: notification-service/Dockerfile
                    - service: frontend
                      context: ./frontend
                      dockerfile: ./frontend/Dockerfile
        steps:
            - uses: actions/checkout@v4

            - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

            - name: Build ${{ matrix.service }}
              uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
              with:
                  context: ${{ matrix.context }}
                  file: ${{ matrix.dockerfile }}
                  push: false
                  load: true
                  tags: ${{ matrix.service }}:pr-${{ github.event.pull_request.number }}

            - name: Scan Trivy ${{ matrix.service }}
              uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8  # v0.36.0
              with:
                  image-ref: ${{ matrix.service }}:pr-${{ github.event.pull_request.number }}
                  format: table
                  exit-code: '1'
                  severity: HIGH,CRITICAL
                  trivyignores: .trivyignore

    # ─── Vérification du manifest de compatibilité ──────────────────────────────

    verify-manifest:
        name: Vérification compatibility.json
        needs: changes
        if: needs.changes.outputs.manifest == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Vérifier la cohérence du manifest
              run: |
                LATEST=$(jq -r '.latestStack' compatibility.json)

                if ! jq -e --arg v "$LATEST" '.stacks[$v]' compatibility.json > /dev/null; then
                  echo "FAIL: latestStack '$LATEST' introuvable dans .stacks"
                  exit 1
                fi

                FAILED=0
                for svc in auth-service project-service task-service notification-service frontend; do
                  PKG_VERSION=$(jq -r .version "$svc/package.json")
                  MANIFEST_VERSION=$(jq -r --arg s "$svc" --arg v "$LATEST" '.stacks[$v].services[$s]' compatibility.json)
                  IMAGE=$(jq -r --arg s "$svc" --arg v "$LATEST" '.stacks[$v].images[$s]' compatibility.json)
                  IMAGE_TAG="${IMAGE##*:}"

                  if [ "$MANIFEST_VERSION" != "$PKG_VERSION" ]; then
                    echo "MISMATCH services[$svc]: manifest=$MANIFEST_VERSION, package.json=$PKG_VERSION"
                    FAILED=1
                  else
                    echo "OK services[$svc] = $PKG_VERSION"
                  fi

                  if [ "$IMAGE_TAG" != "$PKG_VERSION" ]; then
                    echo "MISMATCH images[$svc]: tag=$IMAGE_TAG, package.json=$PKG_VERSION"
                    FAILED=1
                  else
                    echo "OK images[$svc] tag = $IMAGE_TAG"
                  fi
                done

                exit $FAILED
