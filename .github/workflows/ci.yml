name: CI

on:
  pull_request:
    branches:
      - dev
      - main

jobs:
  # ─── Détection des services modifiés ─────────────────────────────────────────

  changes:
    name: Détection des changements
    runs-on: ubuntu-latest
    outputs:
      auth: ${{ steps.filter.outputs.auth }}
      project: ${{ steps.filter.outputs.project }}
      task: ${{ steps.filter.outputs.task }}
      notification: ${{ steps.filter.outputs.notification }}
      frontend: ${{ steps.filter.outputs.frontend }}
      root: ${{ steps.filter.outputs.root }}
      dockerfile: ${{ steps.filter.outputs.dockerfile }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth:
              - 'auth-service/**'
            project:
              - 'project-service/**'
            task:
              - 'task-service/**'
            notification:
              - 'notification-service/**'
            frontend:
              - 'frontend/**'
            root:
              - 'package.json'
              - 'eslint.config.mjs'
              - '.dependency-cruiser.cjs'
            dockerfile:
              - '**/Dockerfile'

  # ─── Tests par service (uniquement si modifié) ───────────────────────────────

  test-auth:
    name: Tests auth-service
    needs: changes
    if: needs.changes.outputs.auth == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auth-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: auth-service/package-lock.json

      - run: npm ci
      - run: npm test

  test-project:
    name: Tests project-service
    needs: changes
    if: needs.changes.outputs.project == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: project-service/package-lock.json

      - run: npm ci
      - run: npm test

  test-task:
    name: Tests task-service
    needs: changes
    if: needs.changes.outputs.task == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: task-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: task-service/package-lock.json

      - run: npm ci
      - run: npm test

  test-notification:
    name: Tests notification-service
    needs: changes
    if: needs.changes.outputs.notification == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: notification-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: notification-service/package-lock.json

      - run: npm ci
      - run: npm test

  # ─── Qualité du code (si fichiers racine ou n'importe quel service modifié) ──

  lint:
    name: Lint & Architecture
    needs: changes
    if: |
      needs.changes.outputs.root == 'true' ||
      needs.changes.outputs.auth == 'true' ||
      needs.changes.outputs.project == 'true' ||
      needs.changes.outputs.task == 'true' ||
      needs.changes.outputs.notification == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run lint:architecture

  # ─── Lint Dockerfiles ────────────────────────────────────────────────────────

  hadolint:
    name: Hadolint ${{ matrix.service }}
    needs: changes
    if: needs.changes.outputs.dockerfile == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - auth-service
          - project-service
          - task-service
          - notification-service
          - frontend
    steps:
      - uses: actions/checkout@v4

      - uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf  # v3.1.0
        with:
          dockerfile: ${{ matrix.service }}/Dockerfile

  # ─── Sécurité des dépendances ────────────────────────────────────────────────

  audit:
    name: Audit sécurité
    needs: changes
    if: needs.changes.outputs.root == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm audit --audit-level=high

  # ─── Build Docker (sans push) ────────────────────────────────────────────────

  docker-build:
    name: Build Docker ${{ matrix.service }}
    needs: changes
    if: |
      needs.changes.outputs.dockerfile == 'true' ||
      needs.changes.outputs.auth == 'true' ||
      needs.changes.outputs.project == 'true' ||
      needs.changes.outputs.task == 'true' ||
      needs.changes.outputs.notification == 'true' ||
      needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - auth-service
          - project-service
          - task-service
          - notification-service
          - frontend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service }}
          push: false
          tags: ${{ matrix.service }}:pr-${{ github.event.pull_request.number }}
