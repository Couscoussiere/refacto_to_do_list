name: Secret Scan

on:
  push:
    branches:
      - '**'

jobs:
  gitleaks:
    name: Détection de secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Installation de Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_8.27.2_linux_x64.tar.gz | tar -xz
          sudo mv gitleaks /usr/local/bin/

      - name: Scan des secrets
        run: gitleaks detect --source . --redact --no-git
