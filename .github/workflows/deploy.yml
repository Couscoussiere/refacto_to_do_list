name: Deploy

on:
    workflow_run:
        workflows: ['Docker Build Dev']
        types: [completed]
        branches: [dev]
    workflow_dispatch:

jobs:
    deploy-integration:
        name: Déploiement Intégration
        runs-on: ubuntu-latest
        environment: integration
        if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
        permissions:
            packages: read

        steps:
            - uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.workflow_run.head_sha }}

            - name: Créer le fichier .env
              run: |
                  cat > .env << 'ENVEOF'
                  MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
                  MYSQL_AUTH_PASSWORD=${{ secrets.MYSQL_AUTH_PASSWORD }}
                  MYSQL_PROJECT_PASSWORD=${{ secrets.MYSQL_PROJECT_PASSWORD }}
                  MYSQL_TASK_PASSWORD=${{ secrets.MYSQL_TASK_PASSWORD }}
                  JWT_SECRET=${{ secrets.JWT_SECRET }}
                  CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
                  IMAGE_TAG=dev
                  ENVEOF

            - name: Copier les fichiers sur la VM
              uses: appleboy/scp-action@v0.1.7
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USER }}
                  key: ${{ secrets.SSH_PRIVATE_KEY_INT }}
                  source: '.env,docker-compose.deploy.yml,reverse-proxy/nginx.conf'
                  target: ~/app

            - name: Déployer sur la VM
              uses: appleboy/ssh-action@v1.0.3
              env:
                  GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GHCR_USER: ${{ github.actor }}
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USER }}
                  key: ${{ secrets.SSH_PRIVATE_KEY_INT }}
                  envs: GHCR_TOKEN,GHCR_USER
                  script: |
                      cd ~/app

                      echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

                      docker compose -f docker-compose.deploy.yml pull

                      docker compose -f docker-compose.deploy.yml up -d --remove-orphans

                      docker image prune -f

                      echo "--- Statut des conteneurs ---"
                      docker compose -f docker-compose.deploy.yml ps
